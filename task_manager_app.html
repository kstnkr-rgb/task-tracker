
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-tertiary);min-height:100vh}
:root{--c1:#1D9E75;--c1l:#E1F5EE;--c1d:#085041;--c2:#378ADD;--c2l:#E6F1FB;--amber:#BA7517;--amberl:#FAEEDA;--red:#A32D2D;--redl:#FCEBEB}

.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:0 20px;display:flex;align-items:center;gap:16px;height:52px}
.topbar h1{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.nav-tabs{display:flex;gap:2px;margin-left:auto}
.nav-tab{padding:6px 14px;border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;color:var(--color-text-secondary);border:none;background:transparent}
.nav-tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.nav-tab:hover:not(.active){background:var(--color-background-secondary)}

.main{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px)}
.sidebar{width:220px;background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);padding:16px;flex-shrink:0;overflow-y:auto}
.sidebar h3{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.proj-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;color:var(--color-text-secondary)}
.proj-item:hover{background:var(--color-background-secondary)}
.proj-item.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.proj-item.all .proj-dot{background:var(--color-text-tertiary)}
.add-proj-btn{width:100%;margin-top:8px;padding:6px 8px;font-size:13px;color:var(--color-text-tertiary);background:transparent;border:0.5px dashed var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;text-align:left}
.add-proj-btn:hover{background:var(--color-background-secondary);color:var(--color-text-secondary)}

.content{flex:1;overflow-y:auto;padding:20px}

.day-col{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);margin-bottom:12px}
.day-header{padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:10px;cursor:pointer}
.day-title{font-size:14px;font-weight:500;color:var(--color-text-primary);flex:1}
.day-date{font-size:12px;color:var(--color-text-tertiary)}
.day-count{font-size:11px;background:var(--color-background-secondary);color:var(--color-text-secondary);padding:2px 7px;border-radius:10px}
.add-task-btn{font-size:12px;color:var(--c1);border:none;background:transparent;cursor:pointer;padding:3px 8px;border-radius:var(--border-radius-md)}
.add-task-btn:hover{background:var(--c1l)}
.tasks-list{padding:8px;min-height:48px}
.tasks-list.drag-over{background:var(--c1l);border-radius:0 0 var(--border-radius-lg) var(--border-radius-lg)}

.task-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:6px;cursor:grab;display:flex;flex-direction:column;gap:5px;transition:border-color .15s}
.task-card:hover{border-color:var(--color-border-secondary)}
.task-card.dragging{opacity:.4}
.task-card.done .task-title{text-decoration:line-through;color:var(--color-text-tertiary)}
.task-top{display:flex;align-items:center;gap:8px}
.task-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--color-border-secondary);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.task-check.checked{background:var(--c1);border-color:var(--c1)}
.task-check.checked::after{content:'';display:block;width:4px;height:7px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.task-title{font-size:13px;color:var(--color-text-primary);flex:1}
.task-proj-badge{font-size:11px;padding:2px 7px;border-radius:10px;white-space:nowrap}
.task-comment{font-size:12px;color:var(--color-text-tertiary);padding-left:24px;font-style:italic}
.task-actions{display:flex;gap:4px;margin-left:auto}
.task-btn{font-size:11px;padding:2px 6px;border-radius:4px;border:none;background:transparent;cursor:pointer;color:var(--color-text-tertiary)}
.task-btn:hover{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.task-btn.del:hover{background:var(--redl);color:var(--red)}

.empty-drop{border:0.5px dashed var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:16px;text-align:center;font-size:12px;color:var(--color-text-tertiary)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:24px;width:400px;border:0.5px solid var(--color-border-tertiary)}
.modal h3{font-size:15px;font-weight:500;margin-bottom:16px;color:var(--color-text-primary)}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);font-size:13px;color:var(--color-text-primary);font-family:var(--font-sans)}
.form-row textarea{resize:vertical;min-height:60px}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.btn-primary{padding:7px 16px;background:var(--c1);color:#fff;border:none;border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;font-family:var(--font-sans)}
.btn-primary:hover{background:var(--c1d)}
.btn-sec{padding:7px 16px;background:transparent;color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;cursor:pointer}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-header-days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px}
.cal-day-name{text-align:center;font-size:11px;color:var(--color-text-tertiary);font-weight:500;padding:4px 0}
.cal-cell{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);min-height:90px;padding:6px;cursor:pointer;position:relative}
.cal-cell:hover{border-color:var(--color-border-secondary)}
.cal-cell.today{border-color:var(--c1);box-shadow:0 0 0 1px var(--c1)}
.cal-cell.other-month .cal-cell-num{color:var(--color-text-tertiary)}
.cal-cell.drag-over{background:var(--c1l)}
.cal-cell.range-sel{background:var(--c2l)}
.cal-cell-num{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:3px}
.cal-cell.today .cal-cell-num{color:var(--c1)}
.cal-task-chip{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:grab}
.cal-add-btn{position:absolute;bottom:4px;right:4px;font-size:14px;color:var(--color-text-tertiary);background:transparent;border:none;cursor:pointer;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px}
.cal-add-btn:hover{background:var(--color-background-secondary);color:var(--c1)}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.cal-nav button{padding:5px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;color:var(--color-text-secondary);font-size:13px}
.cal-nav button:hover{background:var(--color-background-secondary)}
.cal-nav h2{font-size:15px;font-weight:500;color:var(--color-text-primary);flex:1}

.report-panel{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:20px;margin-bottom:16px}
.report-panel h3{font-size:14px;font-weight:500;margin-bottom:14px;color:var(--color-text-primary)}
.report-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.report-row .form-row{margin:0;flex:1;min-width:120px}
.proj-check-list{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.proj-check{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;padding:4px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary)}
.proj-check input{margin:0}
.proj-check:hover{background:var(--color-background-secondary)}
.report-out{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px;font-size:13px;line-height:1.8;white-space:pre-wrap;font-family:var(--font-mono);color:var(--color-text-primary);min-height:60px;margin-top:12px}
.export-area{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px;font-size:12px;line-height:1.7;white-space:pre-wrap;font-family:var(--font-mono);color:var(--color-text-primary)}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.view-hidden{display:none}
</style>

<div class="app" id="app">
<div class="topbar">
  <span style="font-size:18px">✦</span>
  <h1>Трекер задач</h1>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showView('list')">Список</button>
    <button class="nav-tab" onclick="showView('cal')">Календарь</button>
    <button class="nav-tab" onclick="showView('report')">Отчёт</button>
    <button class="nav-tab" onclick="showView('export')">Экспорт</button>
  </div>
</div>
<div class="main">
  <div class="sidebar">
    <h3>Проекты</h3>
    <div class="proj-item all active" onclick="filterProject('all')">
      <span class="proj-dot"></span> Все задачи
    </div>
    <div id="proj-list"></div>
    <button class="add-proj-btn" onclick="addProject()">+ Новый проект</button>
  </div>
  <div class="content">
    <div id="view-list"></div>
    <div id="view-cal" class="view-hidden"></div>
    <div id="view-report" class="view-hidden"></div>
    <div id="view-export" class="view-hidden"></div>
  </div>
</div>
</div>

<div id="modal" class="modal-bg view-hidden">
  <div class="modal">
    <h3 id="modal-title">Новая задача</h3>
    <div class="form-row"><label>Название</label><input id="t-name" placeholder="Что нужно сделать?"></div>
    <div class="form-row"><label>Проект</label>
      <select id="t-proj"></select>
    </div>
    <div class="form-row"><label>Комментарий</label><textarea id="t-comment" placeholder="Заметки..."></textarea></div>
    <div class="modal-btns">
      <button class="btn-sec" onclick="closeModal()">Отмена</button>
      <button class="btn-primary" onclick="saveTask()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const COLORS=['#1D9E75','#378ADD','#BA7517','#993556','#3B6D11','#534AB7','#D85A30','#0F6E56'];
const BGLIGHTS=['#E1F5EE','#E6F1FB','#FAEEDA','#FBEAF0','#EAF3DE','#EEEDFE','#FAECE7','#E1F5EE'];

let state={
  projects:[
    {id:'p1',name:'Личное',color:COLORS[0],bg:BGLIGHTS[0]},
    {id:'p2',name:'Работа',color:COLORS[1],bg:BGLIGHTS[1]},
  ],
  days:{},
  filter:'all'
};

let editTaskId=null,editDayKey=null,modalDayKey=null;
let dragTaskId=null,dragFromDay=null,dragFromIdx=null;
let calYear=2026,calMonth=2;
let rangeStart=null,rangeEnd=null;

function genId(){return Math.random().toString(36).slice(2,9)}
function today(){const d=new Date();return fmtKey(d.getFullYear(),d.getMonth(),d.getDate())}
function fmtKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function fmtDisplay(k){const[y,m,d]=k.split('-');const dt=new Date(+y,+m-1,+d);return dt.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function fmtShort(k){const[y,m,d]=k.split('-');const dt=new Date(+y,+m-1,+d);return dt.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}
function proj(id){return state.projects.find(p=>p.id===id)||{name:'—',color:'#888',bg:'#eee'}}
function dayTasks(key){return state.days[key]||[]}
function initDay(key){if(!state.days[key])state.days[key]=[];}

function ensureToday(){
  const k=today();
  initDay(k);
  const keys=Object.keys(state.days);
  if(!keys.includes(k)){keys.push(k);}
}

function visibleDays(){
  ensureToday();
  let keys=Object.keys(state.days).sort().reverse();
  return keys;
}

function filterTasks(tasks){
  if(state.filter==='all')return tasks;
  return tasks.filter(t=>t.proj===state.filter);
}

function showView(v){
  ['list','cal','report','export'].forEach(x=>{
    document.getElementById('view-'+x).className=x===v?'':'view-hidden';
  });
  document.querySelectorAll('.nav-tab').forEach((btn,i)=>{
    btn.classList.toggle('active',['list','cal','report','export'][i]===v);
  });
  if(v==='list')renderList();
  if(v==='cal')renderCal();
  if(v==='report')renderReport();
  if(v==='export')renderExport();
}

function renderSidebar(){
  const el=document.getElementById('proj-list');
  el.innerHTML=state.projects.map(p=>`
    <div class="proj-item${state.filter===p.id?' active':''}" onclick="filterProject('${p.id}')">
      <span class="proj-dot" style="background:${p.color}"></span>
      <span style="flex:1">${p.name}</span>
      <span style="font-size:10px;cursor:pointer;color:var(--color-text-tertiary)" onclick="event.stopPropagation();deleteProject('${p.id}')">✕</span>
    </div>`).join('');
  const sel=document.getElementById('t-proj');
  if(sel)sel.innerHTML=state.projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
}

function filterProject(id){
  state.filter=id;
  renderSidebar();
  const cur=document.querySelector('.nav-tab.active');
  const views=['list','cal','report','export'];
  const active=views.find((_,i)=>document.querySelectorAll('.nav-tab')[i]&&document.querySelectorAll('.nav-tab')[i].classList.contains('active'));
  if(!active||active==='list')renderList();
  if(active==='cal')renderCal();
}

function addProject(){
  const name=prompt('Название проекта:');
  if(!name)return;
  const idx=state.projects.length%COLORS.length;
  state.projects.push({id:'p'+genId(),name:name.trim(),color:COLORS[idx],bg:BGLIGHTS[idx]});
  renderSidebar();
  renderList();
}

function deleteProject(id){
  if(!confirm('Удалить проект? Задачи останутся, но потеряют привязку.'))return;
  state.projects=state.projects.filter(p=>p.id!==id);
  renderSidebar();
  renderList();
}

function openModal(dayKey,taskId){
  modalDayKey=dayKey;
  editTaskId=taskId||null;
  renderSidebar();
  document.getElementById('modal-title').textContent=taskId?'Редактировать задачу':'Новая задача';
  if(taskId){
    const t=dayTasks(dayKey).find(x=>x.id===taskId);
    if(t){
      document.getElementById('t-name').value=t.name;
      document.getElementById('t-proj').value=t.proj||state.projects[0]?.id||'';
      document.getElementById('t-comment').value=t.comment||'';
    }
  } else {
    document.getElementById('t-name').value='';
    document.getElementById('t-proj').value=state.projects[0]?.id||'';
    document.getElementById('t-comment').value='';
  }
  document.getElementById('modal').className='modal-bg';
}

function closeModal(){document.getElementById('modal').className='modal-bg view-hidden';}

function saveTask(){
  const name=document.getElementById('t-name').value.trim();
  if(!name)return;
  const p=document.getElementById('t-proj').value;
  const comment=document.getElementById('t-comment').value.trim();
  initDay(modalDayKey);
  if(editTaskId){
    const t=state.days[modalDayKey].find(x=>x.id===editTaskId);
    if(t){t.name=name;t.proj=p;t.comment=comment;}
  } else {
    state.days[modalDayKey].push({id:genId(),name,proj:p,comment,done:false});
  }
  closeModal();
  renderList();
  renderCal();
}

function toggleDone(dayKey,taskId){
  const t=dayTasks(dayKey).find(x=>x.id===taskId);
  if(t){t.done=!t.done;}
  renderList();
}

function deleteTask(dayKey,taskId){
  if(!state.days[dayKey])return;
  state.days[dayKey]=state.days[dayKey].filter(t=>t.id!==taskId);
  renderList();
  renderCal();
}

function addDay(){
  const k=prompt('Дата (ГГГГ-ММ-ДД):',today());
  if(!k||!/^\d{4}-\d{2}-\d{2}$/.test(k))return;
  initDay(k);
  renderList();
}

function renderList(){
  const el=document.getElementById('view-list');
  const days=visibleDays();
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <span style="font-size:13px;color:var(--color-text-secondary)">${state.filter==='all'?'Все задачи':proj(state.filter).name}</span>
    <div style="display:flex;gap:8px">
      <button class="btn-sec" style="font-size:12px" onclick="addDay()">+ Добавить день</button>
      <button class="btn-primary" style="font-size:12px" onclick="openModal('${today()}')">+ Задача на сегодня</button>
    </div>
  </div>`;
  if(days.length===0){html+='<div class="empty-drop">Нет дней с задачами</div>';el.innerHTML=html;return;}
  html+=days.map(key=>{
    const tasks=filterTasks(dayTasks(key));
    const all=dayTasks(key);
    const isToday=key===today();
    return `<div class="day-col" id="day-${key}">
      <div class="day-header">
        <span class="day-title">${isToday?'Сегодня':fmtDisplay(key)}</span>
        <span class="day-date">${isToday?fmtDisplay(key):''}</span>
        <span class="day-count">${all.length}</span>
        <button class="add-task-btn" onclick="openModal('${key}')">+ задача</button>
      </div>
      <div class="tasks-list" id="list-${key}"
        ondragover="onDragOver(event,'${key}')"
        ondrop="onDrop(event,'${key}')"
        ondragleave="onDragLeave(event,'${key}')">
        ${tasks.length===0?`<div class="empty-drop">Перетащите сюда</div>`:
          tasks.map((t,i)=>taskCardHtml(t,key,i)).join('')}
      </div>
    </div>`;
  }).join('');
  el.innerHTML=html;
}

function taskCardHtml(t,key,i){
  const p=proj(t.proj);
  return `<div class="task-card${t.done?' done':''}" id="tc-${t.id}"
    draggable="true"
    ondragstart="onDragStart(event,'${t.id}','${key}',${i})"
    ondragend="onDragEnd()">
    <div class="task-top">
      <div class="task-check${t.done?' checked':''}" onclick="toggleDone('${key}','${t.id}')"></div>
      <span class="task-title">${t.name}</span>
      <span class="task-proj-badge" style="background:${p.bg};color:${p.color}">${p.name}</span>
      <div class="task-actions">
        <button class="task-btn" onclick="openModal('${key}','${t.id}')">✎</button>
        <button class="task-btn" onclick="moveTask('${key}','${t.id}')">→</button>
        <button class="task-btn del" onclick="deleteTask('${key}','${t.id}')">✕</button>
      </div>
    </div>
    ${t.comment?`<div class="task-comment">${t.comment}</div>`:''}
  </div>`;
}

function moveTask(fromDay,taskId){
  const k=prompt('Перенести на дату (ГГГГ-ММ-ДД):', today());
  if(!k||!/^\d{4}-\d{2}-\d{2}$/.test(k))return;
  const t=state.days[fromDay]?.find(x=>x.id===taskId);
  if(!t)return;
  state.days[fromDay]=state.days[fromDay].filter(x=>x.id!==taskId);
  initDay(k);
  state.days[k].push(t);
  renderList();
  renderCal();
}

let dragOvEl=null;
function onDragStart(e,taskId,dayKey,idx){
  dragTaskId=taskId;dragFromDay=dayKey;dragFromIdx=idx;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=document.getElementById('tc-'+taskId);if(el)el.classList.add('dragging');},0);
}
function onDragEnd(){
  if(dragTaskId){const el=document.getElementById('tc-'+dragTaskId);if(el)el.classList.remove('dragging');}
  dragTaskId=null;dragFromDay=null;dragFromIdx=null;
  document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
}
function onDragOver(e,dayKey){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  document.getElementById('list-'+dayKey)?.classList.add('drag-over');
}
function onDragLeave(e,dayKey){document.getElementById('list-'+dayKey)?.classList.remove('drag-over');}
function onDrop(e,toDay){
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
  if(!dragTaskId||!dragFromDay)return;
  const t=state.days[dragFromDay]?.find(x=>x.id===dragTaskId);
  if(!t)return;
  state.days[dragFromDay]=state.days[dragFromDay].filter(x=>x.id!==dragTaskId);
  initDay(toDay);
  const overEl=e.target.closest('.task-card');
  if(overEl&&toDay===dragFromDay){
    const overId=overEl.id.replace('tc-','');
    const idx=state.days[toDay].findIndex(x=>x.id===overId);
    if(idx>=0){state.days[toDay].splice(idx,0,t);}else{state.days[toDay].push(t);}
  } else {
    state.days[toDay].push(t);
  }
  renderList();renderCal();
}

function renderCal(){
  const el=document.getElementById('view-cal');
  const y=calYear,m=calMonth;
  const mn=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const dn=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const first=new Date(y,m,1);
  const startDow=(first.getDay()+6)%7;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  let cells=[];
  for(let i=startDow-1;i>=0;i--)cells.push({d:prevDays-i,m:m-1,y:m===0?y-1:y,other:true});
  for(let d=1;d<=daysInMonth;d++)cells.push({d,m,y,other:false});
  const rem=7-(cells.length%7);if(rem<7)for(let d=1;d<=rem;d++)cells.push({d,m:m+1,y:m===11?y+1:y,other:true});

  let html=`<div class="cal-nav">
    <button onclick="calPrev()">‹</button>
    <h2>${mn[m]} ${y}</h2>
    <button onclick="calNext()">›</button>
    ${rangeStart?`<span style="font-size:12px;color:var(--color-text-secondary)">Выбрано: ${fmtShort(rangeStart)}${rangeEnd?' — '+fmtShort(rangeEnd):' ...'}</span>
    <button class="btn-sec" style="font-size:12px" onclick="clearRange()">Сбросить</button>`:''}
  </div>
  <div class="cal-header-days">${dn.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}</div>
  <div class="cal-grid">`;
  cells.forEach(c=>{
    const k=fmtKey(c.y,c.m,c.d);
    const tasks=filterTasks(dayTasks(k));
    const isToday=k===today();
    const inRange=rangeStart&&rangeEnd&&k>=rangeStart&&k<=rangeEnd;
    html+=`<div class="cal-cell${c.other?' other-month':''}${isToday?' today':''}${inRange?' range-sel':''}"
      id="cal-cell-${k}"
      onclick="calCellClick('${k}')"
      ondragover="calDragOver(event,'${k}')"
      ondrop="calDrop(event,'${k}')"
      ondragleave="calDragLeave('${k}')">
      <div class="cal-cell-num">${c.d}</div>
      ${tasks.slice(0,3).map(t=>{const p=proj(t.proj);return`<div class="cal-task-chip" style="background:${p.bg};color:${p.color}" draggable="true" ondragstart="calChipDragStart(event,'${t.id}','${k}')" onclick="event.stopPropagation();openModal('${k}','${t.id}')" title="${t.name}">${t.name}</div>`;}).join('')}
      ${tasks.length>3?`<div style="font-size:10px;color:var(--color-text-tertiary)">+${tasks.length-3} ещё</div>`:''}
      <button class="cal-add-btn" onclick="event.stopPropagation();openModal('${k}')">+</button>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal();}
function clearRange(){rangeStart=null;rangeEnd=null;renderCal();}

function calCellClick(k){
  if(!rangeStart){rangeStart=k;rangeEnd=null;}
  else if(!rangeEnd&&k>=rangeStart){rangeEnd=k;}
  else{rangeStart=k;rangeEnd=null;}
  renderCal();
}

function calDragOver(e,k){e.preventDefault();document.getElementById('cal-cell-'+k)?.classList.add('drag-over');}
function calDragLeave(k){document.getElementById('cal-cell-'+k)?.classList.remove('drag-over');}
function calDrop(e,k){
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
  if(!dragTaskId||!dragFromDay)return;
  const t=state.days[dragFromDay]?.find(x=>x.id===dragTaskId);
  if(!t)return;
  state.days[dragFromDay]=state.days[dragFromDay].filter(x=>x.id!==dragTaskId);
  initDay(k);state.days[k].push(t);
  renderList();renderCal();
}
function calChipDragStart(e,taskId,dayKey){
  dragTaskId=taskId;dragFromDay=dayKey;
  e.dataTransfer.effectAllowed='move';
  e.stopPropagation();
}

function renderReport(){
  const el=document.getElementById('view-report');
  let html=`<div class="report-panel">
    <h3>Параметры отчёта</h3>
    <div class="report-row">
      <div class="form-row"><label>С даты</label><input type="date" id="r-from" value="${rangeStart||''}" onchange="genReport()"></div>
      <div class="form-row"><label>По дату</label><input type="date" id="r-to" value="${rangeEnd||''}" onchange="genReport()"></div>
    </div>
    <div style="margin-top:12px;font-size:12px;color:var(--color-text-secondary)">Проекты:</div>
    <div class="proj-check-list" id="r-projs">
      ${state.projects.map(p=>`<label class="proj-check"><input type="checkbox" value="${p.id}" checked onchange="genReport()"><span style="width:8px;height:8px;border-radius:50%;background:${p.color};display:inline-block"></span>${p.name}</label>`).join('')}
    </div>
    <div class="report-out" id="report-out">Выберите период для генерации отчёта</div>
    <div class="btn-row">
      <button class="btn-primary" onclick="genReport()">Сгенерировать</button>
      <button class="btn-sec" onclick="copyReport()">Копировать текст</button>
    </div>
  </div>`;
  el.innerHTML=html;
  if(rangeStart&&rangeEnd)setTimeout(genReport,50);
}

function genReport(){
  const from=document.getElementById('r-from')?.value;
  const to=document.getElementById('r-to')?.value;
  const checkboxes=document.querySelectorAll('#r-projs input:checked');
  const selProjs=[...checkboxes].map(c=>c.value);
  if(!from||!to){document.getElementById('report-out').textContent='Укажите период';return;}
  let lines=[`ОТЧЁТ ПО ЗАДАЧАМ`,`Период: ${fmtShort(from)} — ${fmtShort(to)}`,`Проекты: ${selProjs.map(id=>proj(id).name).join(', ')||'—'}`,``];
  const byProj={};
  selProjs.forEach(id=>{byProj[id]=[];});
  Object.keys(state.days).sort().forEach(k=>{
    if(k<from||k>to)return;
    state.days[k].forEach(t=>{
      if(selProjs.includes(t.proj)){byProj[t.proj].push({...t,day:k});}
    });
  });
  let total=0;
  selProjs.forEach(id=>{
    const tasks=byProj[id];if(!tasks.length)return;
    total+=tasks.length;
    lines.push(`── ${proj(id).name.toUpperCase()} (${tasks.length} задач) ──`);
    tasks.forEach(t=>{
      lines.push(`  ${t.done?'[✓]':'[ ]'} ${fmtShort(t.day)}  ${t.name}${t.comment?'\n       '+t.comment:''}`);
    });
    lines.push('');
  });
  lines.push(`Итого: ${total} задач`);
  document.getElementById('report-out').textContent=lines.join('\n');
}

function copyReport(){
  const text=document.getElementById('report-out')?.textContent||'';
  navigator.clipboard?.writeText(text);
}

function renderExport(){
  const el=document.getElementById('view-export');
  const data=JSON.stringify(state,null,2);
  el.innerHTML=`<div class="report-panel">
    <h3>Экспорт данных</h3>
    <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:12px">Скопируйте JSON для сохранения. Импортируйте его обратно для восстановления.</p>
    <div class="export-area" id="export-json">${data}</div>
    <div class="btn-row">
      <button class="btn-primary" onclick="copyExport()">Копировать JSON</button>
      <button class="btn-sec" onclick="importData()">Импортировать</button>
    </div>
  </div>`;
}

function copyExport(){
  const text=document.getElementById('export-json')?.textContent||'';
  navigator.clipboard?.writeText(text);
}

function importData(){
  const raw=prompt('Вставьте JSON:');
  if(!raw)return;
  try{
    const d=JSON.parse(raw);
    if(d.projects&&d.days){state=d;renderSidebar();renderList();alert('Данные импортированы!');}
    else alert('Неверный формат.');
  }catch(e){alert('Ошибка парсинга JSON.');}
}

const d=new Date();
calYear=d.getFullYear();calMonth=d.getMonth();
ensureToday();
renderSidebar();
renderList();
</script>
